name: CI Lint

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install SDL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements_dev.txt ]; then pip install -r requirements_dev.txt; fi

      - name: Lint with pylint
        env:
          PYGAME_DETECT_AVX2: 1
          PYTHONPATH: src
        run: pylint src tests --extension-pkg-whitelist=pygame

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          # Alzata la complessità a 20 per permettere funzioni più articolate come il main
          flake8 src tests --count --exit-zero --max-complexity=20 --max-line-length=127 --statistics

      - name: Lint with mypy
        env:
          PYTHONPATH: src
        run: mypy src tests --ignore-missing-imports

      - name: Check code formatting with black
        run: black --check --diff src tests

      - name: Check code formatting with isort
        run: isort --check-only --diff src tests