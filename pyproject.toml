[tool.pyright]
extraPaths = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.pylint.MASTER]
init-hook='import sys; sys.path.append("src")'

[tool.mypy]
warn_return_any = true
warn_unused_configs = true
# Diciamo a Mypy che il nostro codice vive nella cartella src!
mypy_path = "src"
explicit_package_bases = true

[[tool.mypy.overrides]]
module = ["pygame.*"]
ignore_missing_imports = true